privacy:
  title: "隐私政策"
  description: "本网站的隐私政策说明"
  content: |
    ## 隐私政策

    最后更新日期：2026年3月27日

    欢迎访问我们的网站。我们重视您的隐私，本隐私政策说明我们如何收集、使用和保护您的个人信息。

    ### 信息收集

    我们可能收集以下类型的信息：

    - **访问信息**：包括您的 IP 地址、浏览器类型、访问时间等
    - **Cookie**：我们使用 Cookie 来改善您的浏览体验
    - **评论信息**：如果您使用评论功能，我们会收集您提供的信息

    ### 信息使用

    我们收集的信息用于：

    - 提供和改善我们的服务
    - 分析网站使用情况
    - 与您沟通（如果您提供了联系方式）

    ### 信息保护

    我们采取合理的安全措施来保护您的个人信息，防止未经授权的访问、使用或泄露。

    ### 第三方服务

    我们的网站可能包含第三方服务的链接或使用第三方服务（如评论系统）。这些服务有自己的隐私政策，我们建议您查阅。

    ### Cookie 政策

    我们使用 Cookie 来：

    - 记住您的偏好设置
    - 分析网站流量
    - 改善用户体验

    您可以通过浏览器设置管理 Cookie。

    ### 联系我们

    如果您对本隐私政策有任何疑问，请联系我们：

    - 邮箱：admin@azxt.org

    ### 政策更新

    我们可能会不时更新本隐私政策。更新后的政策将在本页面发布。

terms:
