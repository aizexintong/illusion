    ## 使用条款

    最后更新日期：2026年3月27日

    欢迎访问本网站。在使用本网站之前，请仔细阅读以下使用条款。

    ### 接受条款

    访问和使用本网站即表示您同意受本使用条款的约束。如果您不同意这些条款，请不要使用本网站。

    ### 知识产权

    本网站的所有内容，包括但不限于文字、图片、代码、设计，均受知识产权法保护。

    - 本站原创内容采用 [CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/) 许可协议
    - 您可以自由分享和修改本站内容，但需注明出处
    - 商业使用需获得授权

    ### 用户行为

    使用本网站时，您同意：

    - 不进行任何可能损害网站的行为
    - 不上传恶意代码或病毒
    - 不侵犯他人权利
    - 不进行任何违法活动

    ### 免责声明

    本网站提供的信息仅供参考，我们不对信息的准确性、完整性或及时性做出保证。

    在法律允许的范围内，我们不对因使用本网站而导致的任何损失承担责任。

    ### 外部链接

    本网站可能包含指向其他网站的链接。我们不对这些外部网站的内容或隐私政策负责。

    ### 条款修改

    我们保留随时修改本使用条款的权利。修改后的条款将在本页面发布。

    ### 适用法律

    本使用条款受中华人民共和国法律管辖。

    ### 联系我们

    如果您对本使用条款有任何疑问，请联系我们：

    - 邮箱：admin@azxt.org
