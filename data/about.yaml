content: |
  # 关于爱则心痛

  你好！我是**爱则心痛**，一名热爱技术的全栈开发者。我的名字源于对技术的热爱与执着——爱则心痛，因为热爱所以投入，因为投入所以深刻。

  ## 个人简介

  我是一名专注于现代Web技术和Rust生态的开发者，对前端工程化、跨平台应用开发和系统编程有着浓厚的兴趣。相信技术能够改变世界，享受从0到1创造产品的过程，热爱在开源社区中分享知识和经验。

  ### 技术理念
  - **优雅简洁**：追求代码的简洁性和可维护性，相信好的代码本身就是最好的文档
  - **持续学习**：技术日新月异，保持好奇心和学习能力是开发者最重要的品质
  - **分享共赢**：知识因分享而更有价值，开源精神推动技术进步
  - **用户体验**：技术服务于人，优秀的用户体验是产品的灵魂

  ## 技术专长

  ### 前端开发
  - **现代框架**：Vue.js 3、React 18
  - **工程化**：TypeScript、Vite、Webpack
  - **性能优化**：代码分割、懒加载、渲染优化

  ### 后端开发
  - **服务端语言**：Rust、Node.js、Python
  - **架构设计**：微服务、RESTful API
  - **数据库**：PostgreSQL、MySQL、Redis

  ### 移动开发
  - **跨平台**：Flutter、React Native

  ## 开源贡献

  我积极参与开源社区，相信开源精神能够推动技术进步。

  ## 联系方式

  - **邮箱**：admin@azxt.org
  - **GitHub**：[aizexintong](https://github.com/aizexintong)
  - **网站**：https://azxt.org
