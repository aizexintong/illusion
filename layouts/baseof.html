<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <!-- 背景层 -->
  <div class="bg-layer bg-image-layer">
    <img src="{{ .Site.Params.adaptiveImage | default "https://t.alcy.cc/ycy" }}" alt="背景图片" class="bg-image" loading="lazy">
  </div>
  <div class="bg-layer bg-overlay-layer"></div>
  <div class="bg-layer bg-effects-layer">
    <canvas id="particles-canvas"></canvas>
    <div class="sakura-container" id="sakura-container"></div>
    <div class="stars-container" id="stars-container"></div>
    <div class="light-particles" id="light-particles"></div>
    <div class="firefly-container" id="firefly-container"></div>
  </div>
  <div class="bg-layer bg-blur-layer"></div>

  <!-- 内容层 -->
  <div class="content-wrapper">
    <header>
      {{ partial "header.html" . }}
    </header>
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    <footer>
      {{ partial "footer.html" . }}
    </footer>
  </div>

  <!-- 搜索弹窗 -->
  {{ partial "search-modal.html" . }}

  <!-- 返回顶部/底部按钮 -->
  <div class="scroll-buttons" id="scroll-buttons">
    <button class="scroll-btn scroll-to-top" onclick="scrollToTop()" aria-label="返回顶部" title="返回顶部">
      <i class="fas fa-chevron-up"></i>
    </button>
    <button class="scroll-btn scroll-to-bottom" onclick="scrollToBottom()" aria-label="跳到底部" title="跳到底部">
      <i class="fas fa-chevron-down"></i>
    </button>
  </div>

  <!-- 图片灯箱 -->
  <div class="lightbox-overlay" id="lightbox-overlay" onclick="closeLightbox()">
    <button class="lightbox-close" aria-label="关闭">
      <i class="fas fa-times"></i>
    </button>
    <img class="lightbox-image" id="lightbox-image" src="" alt="">
  </div>

  <!-- 第三方库脚本 (延迟加载) -->
  <script defer src="{{ "lib/aos/aos.js" | relURL }}"></script>
  <script defer src="{{ "lib/typed.js/typed.js" | relURL }}"></script>

  <!-- 自定义脚本 -->
  {{ partialCached "head/js.html" . }}

  <!-- 功能脚本 -->
  <script>
    // ===== 装饰效果 =====
    function createSakura() {
      const container = document.getElementById('sakura-container');
      if (!container) return;
      for (let i = 0; i < 18; i++) {
        const sakura = document.createElement('div');
        sakura.className = 'sakura';
        sakura.style.left = Math.random() * 100 + 'vw';
        sakura.style.animationDuration = (Math.random() * 15 + 15) + 's';
        sakura.style.animationDelay = Math.random() * 12 + 's';
        const size = Math.random() * 16 + 14;
        sakura.style.width = size + 'px';
        sakura.style.height = size + 'px';
        container.appendChild(sakura);
      }
    }

    function createStars() {
      const container = document.getElementById('stars-container');
      if (!container) return;
      for (let i = 0; i < 30; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.animationDelay = Math.random() * 2 + 's';
        star.style.animationDuration = (Math.random() * 2 + 1) + 's';
        container.appendChild(star);
      }
    }

    function createLightParticles() {
      const container = document.getElementById('light-particles');
      if (!container) return;
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'light-particle';
        particle.style.left = Math.random() * 100 + 'vw';
        particle.style.top = Math.random() * 100 + 'vh';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        container.appendChild(particle);
      }
    }

    function createFireflies() {
      const container = document.getElementById('firefly-container');
      if (!container) return;
      for (let i = 0; i < 18; i++) {
        const firefly = document.createElement('div');
        firefly.className = 'firefly';
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        firefly.style.left = x + 'vw';
        firefly.style.top = y + 'vh';
        firefly.style.animationDelay = (Math.random() * 5) + 's';
        firefly.style.animationDuration = (Math.random() * 2 + 2) + 's';
        container.appendChild(firefly);
        animateFirefly(firefly, x, y);
      }
    }

    function animateFirefly(el, x, y) {
      const move = () => {
        const nx = x + (Math.random() - 0.5) * 20;
        const ny = y + (Math.random() - 0.5) * 20;
        const clampedX = Math.max(2, Math.min(98, nx));
        const clampedY = Math.max(2, Math.min(98, ny));
        const duration = (Math.random() * 4 + 3);
        el.style.transition = `left ${duration}s ease-in-out, top ${duration}s ease-in-out`;
        el.style.left = clampedX + 'vw';
        el.style.top = clampedY + 'vh';
        x = clampedX;
        y = clampedY;
        setTimeout(move, duration * 1000);
      };
      setTimeout(move, Math.random() * 3000);
    }

    // ===== 返回顶部/底部 =====
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
    }

    function updateScrollButtons() {
      const buttons = document.getElementById('scroll-buttons');
      if (!buttons) return;
      const scrollY = window.scrollY;
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const threshold = 300;
      
      // 在顶部隐藏返回顶部按钮
      const topBtn = buttons.querySelector('.scroll-to-top');
      // 在底部隐藏跳到底部按钮
      const bottomBtn = buttons.querySelector('.scroll-to-bottom');
      
      if (scrollY > threshold) {
        buttons.classList.add('visible');
        if (topBtn) topBtn.style.display = 'flex';
      } else {
        if (topBtn) topBtn.style.display = 'none';
      }
      
      if (scrollY < maxScroll - threshold) {
        buttons.classList.add('visible');
        if (bottomBtn) bottomBtn.style.display = 'flex';
      } else {
        if (bottomBtn) bottomBtn.style.display = 'none';
      }
      
      // 如果两个按钮都隐藏，隐藏整个容器
      if (scrollY <= threshold && scrollY >= maxScroll - threshold) {
        buttons.classList.remove('visible');
      }
    }

    // ===== 图片灯箱 =====
    function openLightbox(img) {
      const overlay = document.getElementById('lightbox-overlay');
      const lightboxImg = document.getElementById('lightbox-image');
      if (!overlay || !lightboxImg) return;
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const overlay = document.getElementById('lightbox-overlay');
      if (!overlay) return;
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    function initLightbox() {
      const contentImages = document.querySelectorAll('.article-content-wrapper img, .markdown-content img');
      contentImages.forEach(img => {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', () => openLightbox(img));
      });
    }

    // ===== 代码块增强 =====
    function initCodeBlocks() {
      const codeBlocks = document.querySelectorAll('pre code');
      codeBlocks.forEach((code, index) => {
        const pre = code.parentElement;
        if (pre.parentElement.classList.contains('code-block-wrapper')) return;

        const lang = code.className.match(/language-(\w+)/);
        const langName = lang ? lang[1] : 'code';

        const wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        pre.parentNode.insertBefore(wrapper, pre);

        const header = document.createElement('div');
        header.className = 'code-block-header';
        header.innerHTML = `
          <span class="code-block-lang">${langName}</span>
          <button class="code-block-copy" onclick="copyCode(this)" data-index="${index}">
            <i class="fas fa-copy"></i>
            <span>复制</span>
          </button>
        `;
        wrapper.appendChild(header);
        wrapper.appendChild(pre);
      });
    }

    function copyCode(btn) {
      const wrapper = btn.closest('.code-block-wrapper');
      const code = wrapper.querySelector('pre code');
      const text = code.textContent;

      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.querySelector('span').textContent = '已复制';
        btn.querySelector('i').className = 'fas fa-check';

        setTimeout(() => {
          btn.classList.remove('copied');
          btn.querySelector('span').textContent = '复制';
          btn.querySelector('i').className = 'fas fa-copy';
        }, 2000);
      });
    }

    // ===== TOC 高亮 =====
    function initTOCHighlight() {
      const tocLinks = document.querySelectorAll('.toc-body a');
      if (tocLinks.length === 0) return;

      const headings = [];
      tocLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href && href.startsWith('#')) {
          const id = href.substring(1);
          const heading = document.getElementById(id);
          if (heading) headings.push({ element: heading, link: link });
        }
      });

      function updateActiveTOC() {
        let current = headings[0];
        const scrollTop = window.scrollY + 100;

        headings.forEach(item => {
          if (item.element.offsetTop <= scrollTop) {
            current = item;
          }
        });

        tocLinks.forEach(link => link.classList.remove('active'));
        if (current) current.link.classList.add('active');
      }

      window.addEventListener('scroll', updateActiveTOC);
      updateActiveTOC();
    }

    // ===== 初始化 =====
    document.addEventListener('DOMContentLoaded', function() {
      createSakura();
      createStars();
      createLightParticles();
      createFireflies();
      initLightbox();
      initCodeBlocks();
      initTOCHighlight();
      updateScrollButtons();
    });

    window.addEventListener('scroll', updateScrollButtons);

    // ESC 关闭灯箱
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });

    // 初始化 AOS
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        if (typeof AOS !== 'undefined') {
          AOS.init({
            duration: 800,
            easing: 'ease-out-cubic',
            once: true,
            offset: 50
          });
        }
      }, 100);
    });

    // 初始化 Typed.js
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        document.querySelectorAll('.typed-text').forEach(el => {
          const strings = JSON.parse(el.dataset.typed || '[]');
          if (strings.length > 0 && typeof Typed !== 'undefined') {
            new Typed(el, {
              strings: strings,
              typeSpeed: 60,
              backSpeed: 40,
              backDelay: 2000,
              loop: true
            });
          }
        });
      }, 200);
    });
  </script>
</body>
</html>
